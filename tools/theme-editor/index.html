<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>toDone — Live Theme Editor</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;display:flex;height:100vh;background:#eceef1;color:#1c1f24;
    font:14px/1.45 -apple-system,"Hiragino Sans",system-ui,sans-serif}
  /* left controls */
  .panel{width:320px;flex:0 0 320px;background:#fff;border-right:1px solid #dcdfe3;overflow-y:auto;padding:14px 14px 90px}
  .panel h1{font-size:15px;margin:2px 0}
  .panel .hint{color:#6b7280;font-size:11.5px;margin:0 0 12px}
  .urlbar{display:flex;gap:6px;margin-bottom:12px}
  .urlbar input{flex:1;border:1px solid #cfd3d8;border-radius:7px;padding:6px 8px;font-size:12px}
  .urlbar button{border:1px solid #cfd3d8;background:#f4f5f7;border-radius:7px;padding:0 10px;cursor:pointer;font-size:12px}
  .group{border:1px solid #e6e8eb;border-radius:10px;padding:8px 11px;margin-bottom:9px}
  .group h2{font-size:12.5px;margin:0 0 6px;color:#374151}
  .ctl{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:6px 0}
  .ctl label{font-size:12px;color:#4b5563;flex:1}
  .ctl input[type=color]{width:36px;height:24px;border:1px solid #cfd3d8;border-radius:6px;padding:0;background:none}
  .ctl input[type=range]{width:120px}
  .ctl .val{font-size:10.5px;color:#6b7280;width:56px;text-align:right;font-variant-numeric:tabular-nums}
  /* right preview */
  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:18px;overflow:auto}
  .frame{width:390px;height:844px;border:10px solid #111;border-radius:44px;overflow:hidden;background:#fff;box-shadow:0 18px 60px rgba(0,0,0,.25)}
  iframe{width:100%;height:100%;border:0;display:block}
  .note{color:#6b7280;font-size:12px}
  .bar{position:fixed;left:0;bottom:0;width:320px;background:#fff;border-top:1px solid #dcdfe3;padding:11px 14px;display:flex;gap:8px}
  .bar button{flex:1;padding:10px;border-radius:8px;border:0;font-weight:700;cursor:pointer}
  .save{background:#4A8CB0;color:#fff}.reset{background:#eceef1;color:#374151}
  .toast{position:fixed;left:160px;bottom:24px;transform:translateX(-50%);background:#1c1f24;color:#fff;padding:9px 14px;border-radius:9px;opacity:0;transition:.2s}
  .toast.on{opacity:1}
</style>
</head>
<body>
  <div class="panel">
    <h1>Live テーマエディタ</h1>
    <p class="hint">右は<b>本物のアプリ(Web)</b>。色を変えると即反映されます。Saveでこちら(JSON)に保存→反映します。</p>
    <div class="urlbar">
      <input id="url" value="http://localhost:8090" />
      <button onclick="reloadApp()">読込</button>
    </div>
    <div id="groups"></div>
  </div>
  <div class="stage">
    <div class="frame"><iframe id="app" src="http://localhost:8090"></iframe></div>
    <div class="note">アプリが出ない場合：Metro の web ポートを上の欄に入れて「読込」（例 8081/8082/8101）。</div>
  </div>
  <div class="bar">
    <button class="reset" onclick="undo()">↩ 戻す</button>
    <button class="reset" onclick="resetAll()">初期値</button>
    <button class="save" onclick="save()">Save</button>
  </div>
  <div class="toast" id="toast"></div>

<script>
// keys = tokens.ts color keys (merged into Colors at runtime). tealTint is computed from teal+alpha.
const DEFAULTS={
  teal:'#4A8CB0', tealDark:'#3E7B9C', tintAlpha:0.16,
  ink:'#2C2E33', ink2:'#3A3F44', muted:'#9CA1A7', faint:'#B4B9BD',
  line:'#EDEEF0', divider:'#E2E5E8', bg:'#FFFFFF', bgSoft:'#F6F7F8', field:'#F3F4F5', chevron:'#C5CACE',
  selectedCell:'#EEF4F8', filterBg:'#E9F1F7', filterText:'#2A6483', red:'#EF5B52',
};
const GROUPS=[
  {name:'アクセント',items:[['teal','アクセント色','color'],['tealDark','濃いアクセント(押下)','color'],['tintAlpha','淡塗りの濃さ(今日ピル等)','range',0,0.4,0.01]]},
  {name:'テキスト',items:[['ink','主要テキスト','color'],['ink2','見出し/アイコン','color'],['muted','補助テキスト','color'],['faint','プレースホルダ','color']]},
  {name:'線・面',items:[['line','罫線/セル枠','color'],['divider','区切り線','color'],['bg','背景','color'],['bgSoft','淡い面/押下','color'],['field','入力欄','color'],['chevron','シェブロン','color']]},
  {name:'状態色',items:[['selectedCell','選択セルの塗り(月)','color'],['filterBg','絞り込み背景','color'],['filterText','絞り込み文字','color'],['red','日曜/削除','color']]},
];
let V={...DEFAULTS};
let history=[];
function snap(){ const cur=JSON.stringify(V); if(history.length&&history[history.length-1]===cur)return; history.push(cur); if(history.length>100)history.shift(); }
function undo(){ if(!history.length){showToast('戻せる変更がありません');return;} V=JSON.parse(history.pop()); buildPanel(); push(); showToast('1つ戻しました'); }

function hexA(hex,a){const h=hex.replace('#','');const n=parseInt(h,16);return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;}
function values(){ // resolved Colors override sent to the app
  const o={}; for(const k in V){ if(k==='tintAlpha')continue; o[k]=V[k]; }
  o.tealTint=hexA(V.teal,V.tintAlpha); return o;
}
function push(){ const f=document.getElementById('app'); try{ f.contentWindow.postMessage({__todoneTheme:true,values:values()},'*'); }catch(e){} }
function buildPanel(){
  const root=document.getElementById('groups');root.innerHTML='';
  for(const g of GROUPS){const box=document.createElement('div');box.className='group';box.innerHTML=`<h2>${g.name}</h2>`;
    for(const[k,label,type,min,max,step]of g.items){const row=document.createElement('div');row.className='ctl';
      if(type==='color')row.innerHTML=`<label>${label}</label><input type="color" value="${V[k]}" onfocus="snap()" oninput="set('${k}',this.value,this)"><span class="val">${V[k]}</span>`;
      else row.innerHTML=`<label>${label}</label><input type="range" min="${min}" max="${max}" step="${step}" value="${V[k]}" onpointerdown="snap()" oninput="set('${k}',+this.value,this)"><span class="val" id="v-${k}">${V[k]}</span>`;
      box.appendChild(row);}
    root.appendChild(box);}
}
function set(k,val,el){V[k]=val;const v=document.getElementById('v-'+k);if(v)v.textContent=val;if(el&&el.type==='color'&&el.nextElementSibling)el.nextElementSibling.textContent=val;push();}
function reloadApp(){const f=document.getElementById('app');f.src=document.getElementById('url').value;}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1600);}
async function save(){try{const r=await fetch('/save',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({values:values(),raw:V},null,2)});showToast(r.ok?'保存しました(theme-draft.json)':'保存失敗');}catch{showToast('保存失敗(サーバ未起動?)');}}
function resetAll(){snap();V={...DEFAULTS};buildPanel();push();showToast('初期値に戻しました');}

document.getElementById('app').addEventListener('load',()=>setTimeout(push,400));
async function init(){try{const r=await fetch('/tokens');const s=await r.json();if(s&&s.raw)V={...DEFAULTS,...s.raw};}catch{}buildPanel();}
init();
</script>
</body>
</html>
